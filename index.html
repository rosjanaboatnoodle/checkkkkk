<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบเช็คสต็อกก๋วยเตี๋ยวเรือรสจนา สาขา 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { box-sizing: border-box; }
    * { font-family: 'Sarabun', sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .lang-btn{
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;
      font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;border:2px solid transparent;
    }
    .lang-btn.active{ background-color:#ea580c;color:white;border-color:#ea580c; }
    .lang-btn:not(.active){ background-color:white;color:#ea580c;border-color:#f3f4f6; }
    .lang-selector{ display:flex;gap:4px;padding:6px;background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .trend-up{ color:#ef4444; }
    .trend-down{ color:#22c55e; }
    .trend-neutral{ color:#6b7280; }
    .qty-invalid{ border-color:#ef4444 !important; background:#fff1f2; }
  </style>
  <style>@view-transition { navigation: auto; }</style>
</head>

<body class="h-full bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50">
  <div id="app" class="h-full w-full overflow-auto">
    <div class="fixed top-4 right-4 z-50 lang-selector">
      <button onclick="setLanguage('th')" class="lang-btn active" id="btn-th" title="ไทย">ไทย</button>
      <button onclick="setLanguage('lo')" class="lang-btn" id="btn-lo" title="ລາວ">ລາວ</button>
      <button onclick="setLanguage('my')" class="lang-btn" id="btn-my" title="မြန်မာ">မြန်</button>
    </div>

    <div id="home-page" class="min-h-full p-4 md:p-6 pt-20">
      <div class="max-w-lg mx-auto">
        <div class="flex items-center justify-between mb-8 gap-4">
          <div>
            <h1 id="shop-title" class="text-2xl md:text-3xl font-bold text-orange-800">🍜 ก๋วยเตี๋ยวเรือรสจนา สาขา 2</h1>
            <p id="txt-daily-check" class="text-orange-600 text-sm mt-1">เช็คสต็อกประจำวัน</p>
          </div>
          <button onclick="showHistory()" class="shrink-0 flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-md hover:shadow-lg transition-all text-orange-700 font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="txt-history">ประวัติ</span>
          </button>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <p id="txt-date2" class="text-gray-500 text-sm">วันที่</p>
          <p id="current-date" class="text-lg font-semibold text-gray-800"></p>
        </div>

        <div class="space-y-4">
          <button onclick="selectCategory('ไก่')" class="w-full bg-gradient-to-r from-yellow-500 to-amber-500 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🍗</div>
              <div class="text-left">
                <p id="cat-chicken" class="text-xl font-bold">ไก่</p>
                <p id="cat-chicken-desc" class="text-yellow-100 text-sm">เช็คสต็อกไก่</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('เนื้อ')" class="w-full bg-gradient-to-r from-red-500 to-rose-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥩</div>
              <div class="text-left">
                <p id="cat-beef" class="text-xl font-bold">เนื้อ</p>
                <p id="cat-beef-desc" class="text-red-100 text-sm">เช็คสต็อกเนื้อ</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('หมู')" class="w-full bg-gradient-to-r from-pink-500 to-fuchsia-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🐖</div>
              <div class="text-left">
                <p id="cat-pork" class="text-xl font-bold">หมู</p>
                <p id="cat-pork-desc" class="text-pink-100 text-sm">เช็คสต็อกหมู</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('ผักสด')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥬</div>
              <div class="text-left">
                <p id="cat-freshveg" class="text-xl font-bold">ผักสด</p>
                <p id="cat-freshveg-desc" class="text-green-100 text-sm">เช็คสต็อกผักสด</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('เครื่องดื่ม')" class="w-full bg-gradient-to-r from-cyan-500 to-sky-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">

              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥤</div>
              <div class="text-left">
                <p id="cat-drink" class="text-xl font-bold">เครื่องดื่ม</p>
                <p id="cat-drink-desc" class="text-cyan-100 text-sm">เช็คสต็อกเครื่องดื่ม</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('ทะเล')" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🦐</div>
              <div class="text-left">
                <p id="cat-seafood" class="text-xl font-bold">ทะเล</p>
                <p id="cat-seafood-desc" class="text-blue-100 text-sm">เช็คสต็อกอาหารทะเล</p>
              </div>

    </div>

    <div id="name-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-lg mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home">กลับหน้าหลัก</span>
        </button>

        <div class="bg-white rounded-2xl p-6 shadow-lg">
          <div id="category-badge" class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-white text-sm font-medium mb-4"></div>
          <h2 id="txt-staff-name-title" class="text-xl font-bold text-gray-800 mb-2">ผู้เช็คสต็อก</h2>
          <p id="txt-staff-name-desc" class="text-gray-500 mb-6">กรุณากรอกชื่อผู้ทำการเช็คสต็อก</p>
          <div class="space-y-4">
            <div>
              <label id="txt-full-name-label" class="block text-sm font-medium text-gray-700 mb-2">ชื่อ-นามสกุล</label>
              <input type="text" id="checker-name" placeholder="กรอกชื่อของคุณ" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors text-lg">
            </div>
            <button onclick="startChecking()" id="btn-start-checking" class="w-full bg-orange-500 text-white py-4 rounded-xl font-semibold text-lg hover:bg-orange-600 transition-colors shadow-md hover:shadow-lg">เริ่มเช็คสต็อก</button>
          </div>
        </div>
      </div>
    </div>

    <div id="stock-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <div class="flex items-center justify-between mb-6">
          <button onclick="goToNamePage()" class="flex items-center gap-2 text-orange-700 hover:text-orange-800 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            <span id="txt-back">กลับ</span>
          </button>
          <div id="stock-category-badge" class="px-4 py-2 rounded-full text-white text-sm font-medium"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-orange-500 to-orange-600 p-4 text-white">
            <p class="text-sm opacity-90"><span id="txt-staff-checker">ผู้เช็คสต็อก:</span> <span id="display-checker-name" class="font-semibold"></span></p>
            <p class="text-sm opacity-90"><span id="txt-date-label">วันที่:</span> <span id="display-date" class="font-semibold"></span></p>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th id="txt-item" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">รายการ</th>
                  <th id="txt-quantity" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-28">จำนวน</th>
                  <th id="txt-unit" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-28">หน่วย</th>
                  <th id="txt-note" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">หมายเหตุ</th>
                </tr>
              </thead>
              <tbody id="stock-table-body" class="divide-y divide-gray-100"></tbody>
            </table>
          </div>

          <div class="p-4 bg-gray-50">
            <button id="save-btn" onclick="saveStock()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-xl font-semibold text-lg hover:from-green-600 hover:to-green-700 transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              <span id="txt-save">บันทึกข้อมูล</span>
            </button>
            <p id="txt-qty-help" class="text-xs text-gray-500 mt-2">* ช่อง “จำนวน” ใส่ได้เฉพาะ 0-9 และสัญลักษณ์ . / + -</p>
          </div>
        </div>
      </div>
    </div>

    <div id="history-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home2">กลับหน้าหลัก</span>
        </button>

        <h2 id="txt-history-title" class="text-2xl font-bold text-gray-800 mb-4">📋 ประวัติการเช็คสต็อก</h2>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label id="txt-select-date" class="block text-sm font-medium text-gray-700 mb-2">เลือกวันที่</label>
              <input type="date" id="filter-date" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
            </div>
            <div>
              <label id="txt-category-label" class="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
              <select id="filter-category" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
                <option value="" id="opt-all">ทั้งหมด</option>
              </select>
            </div>
          </div>
        </div>

        <div id="history-list" class="space-y-4"></div>
        <div id="no-history" class="hidden text-center py-12">
          <div class="text-6xl mb-4">📭</div>
          <p id="txt-no-history" class="text-gray-500">ไม่พบประวัติการเช็คสต็อก</p>
        </div>
      </div>
    </div>

    <div id="history-detail-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="showHistory()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-history">กลับหน้าประวัติ</span>
        </button>
        <div id="history-detail-content" class="bg-white rounded-2xl shadow-lg overflow-hidden"></div>
      </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg hidden transition-all duration-300 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      <span id="toast-message">บันทึกสำเร็จ!</span>
    </div>
  </div>

    const ITEM_META_BY_NAME = (() => {
      const map = {};
      for (const [cat, items] of Object.entries(stockItems)) {
        for (const it of items) {
          map[it.name] = { defaultUnit: it.unit, category: cat };
        }
      }
      return map;
    })();

    const DRAFT_KEY = "rosjana_stock_branch2_draft_v1";
    const QTY_ALLOWED_RE = /[0-9.\-+\/]/;

    function tItem(thName) {
      if (currentLanguage === 'th') return thName;
      return (ITEM_I18N[currentLanguage] && ITEM_I18N[currentLanguage][thName]) || thName;
    }

    function tUnit(thUnit) {
      if (currentLanguage === 'th') return thUnit;
      return (UNIT_I18N[currentLanguage] && UNIT_I18N[currentLanguage][thUnit]) || thUnit;
    }

    function tCategory(thCat) {
      if (currentLanguage === 'th') return thCat;
      const catKeyMap = {
        "ไก่": "chicken",
        "เนื้อ": "beef",
        "หมู": "pork",
        "ผักสด": "freshVeg",
        "เครื่องดื่ม": "drink",
        "ทะเล": "seafood"
      };
      const k = catKeyMap[thCat];
      return (k && translations[currentLanguage] && translations[currentLanguage][k]) ? translations[currentLanguage][k] : thCat;
    }

    function getUnitOptions_(item) {
      const byName = UNIT_OPTIONS_BY_ITEM[item.name];
      if (byName) return byName.slice();
      const u = String(item.unit || "").trim();
      if (u.includes("/")) return u.split("/").map(s => s.trim()).filter(Boolean);
      return u ? [u] : [];
    }

    function normalizeQtyToBase_(qty, unitSelected, unitOptions) {
      const n = Number(qty);
      if (!isFinite(n)) return { qty: NaN, unit: String(unitSelected || "").trim() };

      const u = String(unitSelected || "").trim();
      const opts = (unitOptions || []).map(v => String(v || "").trim());

      if (opts.includes("กรัม") && opts.includes("กิโลกรัม")) {
        return { qty: u === "กรัม" ? n / 1000 : n, unit: "กิโลกรัม" };
      }
      if (opts.includes("ขวด") && opts.includes("ลัง")) {
        return { qty: u === "ลัง" ? n * 24 : n, unit: "ขวด" };
      }
      if (opts.includes("ขวด") && opts.includes("แพ็ค")) {
        return { qty: u === "แพ็ค" ? n * 12 : n, unit: "ขวด" };
      }
      return { qty: n, unit: u };
    }

    function getComparableQty_(it) {
      const base = Number(it?.quantity_base);
      if (isFinite(base)) return base;

      const qty = Number(it?.quantity);
      if (isFinite(qty)) return qty;

      const rawQty = Number(it?.quantity_raw ?? NaN);
      const meta = ITEM_META_BY_NAME[it?.name] || {};
      const unitOptions = getUnitOptions_({ name: it?.name || "", unit: meta.defaultUnit || "" });
      const unitSelected = String(it?.unit_input || it?.unit || "").trim();
      return normalizeQtyToBase_(rawQty, unitSelected, unitOptions).qty;
    }

    function getDisplayUnit_(it) {
      const meta = ITEM_META_BY_NAME[it?.name] || {};
      const unitOptions = getUnitOptions_({ name: it?.name || "", unit: meta.defaultUnit || "" });
      const unitSelected = String(it?.unit_input || it?.unit || "").trim();
      return normalizeQtyToBase_(1, unitSelected, unitOptions).unit || unitSelected || "";
    }

    function getDisplayQty_(it) {
      const base = Number(it?.quantity_base);
      if (isFinite(base)) return base;

      const qty = Number(it?.quantity);
      if (isFinite(qty)) return qty;

      const raw = Number(it?.quantity_raw ?? 0);
      const meta = ITEM_META_BY_NAME[it?.name] || {};
      const unitOptions = getUnitOptions_({ name: it?.name || "", unit: meta.defaultUnit || "" });
      const unitSelected = String(it?.unit_input || it?.unit || "").trim();
      return normalizeQtyToBase_(raw, unitSelected, unitOptions).qty;
    }

    function fmtQty(v) {
      const n = Number(v);
      if (!isFinite(n)) return String(v ?? "");
      return n.toFixed(3).replace(/\.?0+$/, "");
    }

    function loadDraft_() {
      try { return JSON.parse(localStorage.getItem(DRAFT_KEY) || "{}"); }
      catch (_) { return {}; }
    }

    function saveDraft_(draft) {
      try { localStorage.setItem(DRAFT_KEY, JSON.stringify(draft)); } catch (_) {}
    }

    function setDraftValue_(category, itemName, field, value) {
      const draft = loadDraft_();
      if (!draft[category]) draft[category] = {};
      if (!draft[category][itemName]) draft[category][itemName] = {};
      draft[category][itemName][field] = value;
      saveDraft_(draft);
    }

    function getDraftValue_(category, itemName, field) {
      const draft = loadDraft_();
      return draft?.[category]?.[itemName]?.[field] ?? "";
    }

    function clearDraft_(category) {
      const draft = loadDraft_();
      delete draft[category];
      saveDraft_(draft);
    }

    function sanitizeQuantityRaw_(raw) {
      let out = "";
      for (const ch of String(raw || "")) {
        if (QTY_ALLOWED_RE.test(ch)) out += ch;
      }
      out = out.replace(/(?!^)[+-]/g, "");
      return out;
    }

    function parseQuantity_(raw) {
      const s = String(raw || "").trim();
      if (!s) return { ok: true, value: 0 };

      if (/^[+-]?\d*(?:\.\d+)?$/.test(s)) {
        const v = Number(s);
        return Number.isFinite(v) ? { ok: true, value: v } : { ok: false, value: 0 };
      }

      const m = s.match(/^([+-]?\d*(?:\.\d+)?)\s*\/\s*(\d*(?:\.\d+)?)$/);
      if (m) {
        const a = Number(m[1]), b = Number(m[2]);
        if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return { ok: false, value: 0 };
        return { ok: true, value: a / b };
      }

      return { ok: false, value: 0 };
    }

    function sanitizeQuantityInput(el) {
      const after = sanitizeQuantityRaw_(el.value);
      if (el.value !== after) el.value = after;
      const p = parseQuantity_(el.value);
      el.classList.toggle("qty-invalid", !p.ok && el.value.trim() !== "");
      setDraftValue_(currentCategory, el.getAttribute("data-item"), "quantity_raw", el.value);
    }

    function onQtyKeyDown_(e) {
      const ctrl = ["Backspace","Delete","ArrowLeft","ArrowRight","Tab","Home","End","Enter"];
      if (ctrl.includes(e.key) || e.ctrlKey || e.metaKey) return;
      if (!QTY_ALLOWED_RE.test(e.key)) e.preventDefault();
    }

    function normalizeIncomingRecord_(r) {
      return {
        ...r,
        id: String(r.id || ""),
        backendId: String(r.backendId || ""),
        __backendId: String(r.__backendId || r.backendId || r.id || ""),
        items: r.items || r.items_json || "[]"
      };
    }

    function fetchHistoryFromSheet_(limit = 300) {
      return new Promise(async (resolve) => {
        try {
          if (!GOOGLE_SHEET_WEBAPP_URL) {
            resolve([]);
            return;
          }

          const url =
            GOOGLE_SHEET_WEBAPP_URL +
            "?action=list" +
            "&limit=" + encodeURIComponent(String(limit)) +
            "&_ts=" + Date.now();

          try {
            const resp = await fetch(url, { method: "GET" });
            const text = await resp.text();

            try {
              const data = JSON.parse(text);
              if (data && data.ok === true && Array.isArray(data.records)) {
                resolve(data.records.map(normalizeIncomingRecord_));
                return;
              }
            } catch (_) {}
          } catch (_) {}

          const cbName = "sheetCb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
          const script = document.createElement("script");
          let finished = false;

          const cleanup = () => {
            if (finished) return;
            finished = true;
            try { delete window[cbName]; } catch (_) {}
            if (script.parentNode) script.parentNode.removeChild(script);
          };

          const timer = setTimeout(() => {
            cleanup();
            console.warn("fetchHistoryFromSheet_ JSONP timeout");
            resolve([]);
          }, JSONP_TIMEOUT_MS);

          window[cbName] = function(data) {
            clearTimeout(timer);
            cleanup();
            if (data && data.ok === true && Array.isArray(data.records)) {
              resolve(data.records.map(normalizeIncomingRecord_));
            } else {
              resolve([]);
            }
          };

          script.onerror = function() {
            clearTimeout(timer);
            cleanup();
            console.warn("fetchHistoryFromSheet_ JSONP failed");
            resolve([]);
          };

          script.src = url + "&callback=" + encodeURIComponent(cbName);
          document.body.appendChild(script);
        } catch (e) {
          console.warn("fetchHistoryFromSheet_ failed:", e);
          resolve([]);
        }
      });
    }

    async function syncHistoryFromSheet_({ silent = true } = {}) {
      const now = Date.now();
      if (now - lastSheetSyncAt < 1200) return;
      lastSheetSyncAt = now;

      const records = await fetchHistoryFromSheet_(500);
      if (records.length) {
        mergeRecords_(records);
      } else if (!silent && allRecords.length === 0) {
        showToast(translations[currentLanguage].loadingHistoryFailed, "error");
      }
    }

    async function startSheetPolling_() {
      if (sheetPollTimer) clearInterval(sheetPollTimer);
      if (!GOOGLE_SHEET_WEBAPP_URL || !GOOGLE_SHEET_WEBAPP_URL.startsWith("https://script.google.com/macros/s/")) return;

      const initial = await fetchHistoryFromSheet_(500);
      if (initial && initial.length) mergeRecords_(initial);

      sheetPollTimer = setInterval(async () => {
        const recs = await fetchHistoryFromSheet_(500);
        if (recs && recs.length) mergeRecords_(recs);
      }, SHEET_POLL_MS);
    }

    function mergeRecords_(incoming) {
      const byId = new Map((allRecords || []).map(r => [String(r.__backendId || r.id || r.backendId || ""), r]));
      for (const raw of incoming) {
        const r = normalizeIncomingRecord_(raw);
        const k = String(r.__backendId || r.id || r.backendId || "");
        if (!k) continue;
        byId.set(k, r);
      }
      allRecords = Array.from(byId.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
      if (!document.getElementById("history-page").classList.contains("hidden")) renderHistory();
    }

    function getPreviousRecord(category, currentDate) {
      const currentTs = new Date(currentDate).getTime();
      const filtered = allRecords
        .filter(r => r.category === category)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
      return filtered.find(r => new Date(r.date).getTime() < currentTs) || null;
    }

    function getItemFromRecord(record, itemName) {

        const items = JSON.parse(record.items || "[]");

      }
    }

    async function saveStock() {
      const btn = document.getElementById("save-btn");
      const originalBtnHtml = btn.innerHTML;

      const disableBtn_ = () => {
        btn.disabled = true;
        btn.innerHTML = `
          <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          ${translations[currentLanguage].save}
        `;
      };

      const enableBtn_ = () => {
        btn.disabled = false;
        btn.innerHTML = originalBtnHtml;
      };

      const withTimeout_ = (promise, ms, label) =>
        Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(label || "TIMEOUT")), ms))
        ]);

      disableBtn_();

      try {
        const items = stockItems[currentCategory] || [];
        const missingEls = [];
        const invalidEls = [];

        const stockEntries = items.map(item => {
          const qtyEl = document.querySelector(`input[data-item="${item.name}"][data-field="quantity_raw"]`);
          const noteEl = document.querySelector(`input[data-item="${item.name}"][data-field="note"]`);
          const raw = qtyEl ? qtyEl.value.trim() : "";
          const parsed = parseQuantity_(raw);

          if (qtyEl && raw === "") missingEls.push(qtyEl);
          else if (qtyEl && !parsed.ok) invalidEls.push(qtyEl);

          const unitSelectEl = document.querySelector(`select[data-item="${item.name}"][data-field="unit"]`);
          const unitInput = (unitSelectEl ? unitSelectEl.value : null)
            || getDraftValue_(currentCategory, item.name, "unit")
            || getUnitOptions_(item)[0]
            || item.unit;

          const qtyNum = parsed.ok ? parsed.value : 0;
          const norm = normalizeQtyToBase_(qtyNum, unitInput, getUnitOptions_(item));

          return {
            name: item.name,
            unit: norm.unit,
            unit_input: unitInput,
            unit_group: String(item.unit || "").trim(),
            unit_options: getUnitOptions_(item),
            quantity_raw: raw,
            quantity: norm.qty,
            quantity_base: norm.qty,
            note: noteEl ? noteEl.value.trim() : ""
          };
        });

        if (missingEls.length) {
          missingEls.forEach(el => el.classList.add("border-red-500"));
          missingEls[0].scrollIntoView({ behavior: "smooth", block: "center" });
          showToast(translations[currentLanguage].fillAllQty, "error");
          return;
        }

        if (invalidEls.length) {
          invalidEls.forEach(el => el.classList.add("border-red-500"));
          invalidEls[0].scrollIntoView({ behavior: "smooth", block: "center" });
          showToast(translations[currentLanguage].invalidQty, "error");
          return;
        }

        if (allRecords.length >= 999) {
          showToast(translations[currentLanguage].fullLimit, "error");
          return;
        }

        const nowIso = new Date().toISOString();
        const record = {
          id: Date.now().toString(),
          category: currentCategory,
          checker_name: checkerName,
          date: nowIso,
          items: JSON.stringify(stockEntries),
          created_at: nowIso
        };

        let sheetOk = false;
        try {
          if (GOOGLE_SHEET_WEBAPP_URL.startsWith("https://script.google.com/macros/s/")) {
            const payload = {
              __backendId: "web-" + Date.now(),
              ...record
            };

            const resp = await withTimeout_(
              fetch(GOOGLE_SHEET_WEBAPP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
              }),
              15000,
              "SHEET_POST_TIMEOUT"
            );

            sheetOk = !!resp;

            if (sheetOk) {
              mergeRecords_([{
                ...payload,
                backendId: payload.__backendId,
                __backendId: payload.__backendId,
                items: payload.items
              }]);
            }
          }
        } catch (e) {
          console.warn("sheet POST failed:", e);
        }

        if (sheetOk) {
          clearDraft_(currentCategory);
          showToast(translations[currentLanguage].saved, "success");
          setTimeout(async () => {
            goHome();
            await syncHistoryFromSheet_({ silent: true });
          }, 700);
        } else {
          showToast(translations[currentLanguage].saveFailed, "error");
        }
      } catch (err) {
        console.error(err);
        showToast(translations[currentLanguage].error, "error");
      } finally {
        enableBtn_();
      }
    }

    function showHistoryDetail(idOrBackendId) {
      const record = allRecords.find(r => String(r.__backendId || r.id) === String(idOrBackendId));
      if (!record) return;

      window.__currentDetailRecord = idOrBackendId;

      let items = [];
      try { items = JSON.parse(record.items || "[]"); } catch (_) {}

      const previousRecord = getPreviousRecord(record.category, record.date);
      const t = translations[currentLanguage];
      const style = getCategoryStyle(record.category);

      document.getElementById("history-detail-content").innerHTML = `
        <div class="bg-gradient-to-r ${style.grad} p-4 text-white">
          <h3 class="text-xl font-bold mb-2">${tCategory(record.category)}</h3>
          <p class="text-sm opacity-90">${t.staffChecker} <span class="font-semibold">${record.checker_name || "-"}</span></p>
          <p class="text-sm opacity-90">${t.date} <span class="font-semibold">${formatFullDate(record.date, currentLanguage)}</span></p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">${t.item}</th>
                <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.quantity}</th>
                <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.unit}</th>
                ${previousRecord ? `
                  <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.compared}<br><span class="text-xs font-normal">${formatDate(previousRecord.date, currentLanguage)}</span></th>
                  <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.changeLabel}</th>
                  <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.changePctLabel}</th>
                ` : ""}
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">${t.note}</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              ${items.map(item => {
                let comparison = "";
                if (previousRecord) {
                  const prevItem = getItemFromRecord(previousRecord, item.name);
                  if (prevItem) {
                    const curBase = getComparableQty_(item);
                    const prevBase = getComparableQty_(prevItem);
                    const diff = curBase - prevBase;

                    let trend = `<span class="trend-neutral">- ${t.noChange}</span>`;
                    if (diff > 0) trend = `<span class="trend-up">⬆ +${fmtQty(diff)}</span>`;
                    if (diff < 0) trend = `<span class="trend-down">⬇ ${fmtQty(diff)}</span>`;

                    let pctHtml = `<span class="text-gray-400">-</span>`;
                    if (prevBase > 0) {
                      const pct = (diff / prevBase) * 100;
                      const sign = pct > 0 ? "+" : "";
                      const cls = pct > 0 ? "trend-up" : (pct < 0 ? "trend-down" : "trend-neutral");
                      pctHtml = `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
                    } else if (prevBase === 0 && curBase !== 0) {
                      pctHtml = `<span class="text-xs text-blue-600">${t.noPrevious}</span>`;
                    }

                    comparison = `
                      <td class="px-4 py-3 text-center font-semibold text-gray-600">${fmtQty(getDisplayQty_(prevItem))} ${tUnit(getDisplayUnit_(prevItem))}</td>
                      <td class="px-4 py-3 text-center font-semibold">${trend}</td>
                      <td class="px-4 py-3 text-center font-semibold">${pctHtml}</td>
                    `;
                  } else {
                    comparison = `
                      <td class="px-4 py-3 text-center text-gray-400">-</td>
                      <td class="px-4 py-3 text-center"><span class="text-xs text-blue-600">${t.noPrevious}</span></td>
                      <td class="px-4 py-3 text-center"><span class="text-gray-400">-</span></td>
                    `;
                  }
                }

                return `
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium text-gray-800">${tItem(item.name)}</td>
                    <td class="px-4 py-3 text-center font-semibold ${(Number(item.quantity ?? 0) > 0) ? "text-green-600" : "text-red-500"}">${fmtQty(getDisplayQty_(item))}</td>
                    <td class="px-4 py-3 text-center text-gray-600">${tUnit(getDisplayUnit_(item))}</td>
                    ${comparison}
                    <td class="px-4 py-3 text-gray-500">${item.note || "-"}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;

      showPage("history-detail-page");
    }

    async function init() {
      const savedLang = localStorage.getItem("lang");
      if (savedLang && ["th","lo","my"].includes(savedLang)) {
        currentLanguage = savedLang;
        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));

      const today = new Date();
      document.getElementById("current-date").textContent = formatDate(today, currentLanguage);
      document.getElementById("filter-date").value = "";

      updateLanguage();
      await syncHistoryFromSheet_({ silent: true });
      startSheetPolling_();
      setInterval(() => { syncHistoryFromSheet_({ silent: true }); }, 8000);
    }

    init();
  </script>
